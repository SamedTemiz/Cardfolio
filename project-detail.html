<!DOCTYPE html>
<html lang="en" class="noscroll-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Cardfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project-detail.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
</head>

<body class="gallery-body">

    <!-- Progress overlay: shown until gallery data and images are loaded -->
    <div id="galleryProgressOverlay" class="gallery-progress-overlay" aria-hidden="false">
        <div class="gallery-progress-content">
            <div class="gallery-progress-spinner"></div>
            <p class="gallery-progress-text" data-i18n="gallery.loading">Loading...</p>
        </div>
    </div>

    <!-- Top Navigation: wrapper prevents overlap on narrow viewports -->
    <nav class="ui-overlay gallery-top-nav" aria-label="Gallery navigation">
        <a href="index.html" class="gallery-nav-back" data-i18n="nav.back">&larr; BACK TO CARDFOLIO</a>
        <a id="nextProjectBtn" href="#" class="gallery-nav-next-project" data-i18n="gallery.nextProject" style="display: none;">Next project &rarr;</a>
    </nav>

    <!-- Minimal Metadata Overlay -->
    <div class="ui-overlay gallery-meta">
        <h1 class="gallery-title" id="gallery-title"></h1>
        <p class="gallery-year" id="gallery-year"></p>
    </div>

    <!-- Slider Controls -->
    <div class="gallery-controls">
        <button id="prevBtn" class="gallery-btn">&larr;</button>
        <button id="nextBtn" class="gallery-btn">&rarr;</button>
    </div>

    <!-- Swipe Hint (icon only, no text) -->
    <div class="gallery-drag-hint" id="galleryDragHint">
        <dotlottie-player src="/drag_anim.lottie" background="transparent" speed="1" loop autoplay
            style="width: 180px; height: 180px;"></dotlottie-player>
    </div>

    <!-- Error / not-found state: shown when project fails to load or Supabase error -->
    <div id="galleryErrorState" class="gallery-error-state" aria-hidden="true" style="display: none;">
        <div class="gallery-error-card">
            <p class="gallery-error-message" id="galleryErrorMessage"></p>
            <a href="index.html" id="galleryErrorBackBtn" class="gallery-error-back-btn" data-i18n="gallery.backToMenu">Back to Cardfolio</a>
        </div>
    </div>

    <!-- The Horizontal Scroll Container -->
    <div class="gallery-container" id="galleryContainer">
        <!-- Content injected dynamically -->
    </div>

    <script>
        const container = document.getElementById('galleryContainer');
        const galleryHint = document.getElementById('galleryDragHint');
        function dismissHint() {
            if (!galleryHint) return;
            galleryHint.style.opacity = '0';
            setTimeout(() => galleryHint.remove(), 500);
            container.removeEventListener('scroll', dismissHint);
            container.removeEventListener('touchstart', dismissHint);
        }
        if (galleryHint) {
            container.addEventListener('scroll', dismissHint, { passive: true });
            container.addEventListener('touchstart', dismissHint, { passive: true });
        }
    </script>

    <!-- Language Engine -->
    <script type="module">
        import { initI18n } from "./src/i18n.js";
        initI18n();
    </script>

    <!-- Gallery Data Loader -->
    <script type="module">
        import { getProject, getProfile, getProjects, getOptimizedImageUrl } from "./src/data.js";
        import { translateText } from "./src/i18n.js";

        function hideProgressOverlay() {
            const overlay = document.getElementById('galleryProgressOverlay');
            if (!overlay) return;
            overlay.classList.add('hidden');
            overlay.setAttribute('aria-hidden', 'true');
            setTimeout(() => overlay.remove(), 400);
        }

        function showGalleryError(messageI18nKey, backHref = 'index.html') {
            hideProgressOverlay();
            const panel = document.getElementById('galleryErrorState');
            const msgEl = document.getElementById('galleryErrorMessage');
            const backBtn = document.getElementById('galleryErrorBackBtn');
            if (panel && msgEl) {
                msgEl.textContent = translateText(messageI18nKey);
                if (backBtn) backBtn.href = backHref;
                panel.style.display = 'flex';
                panel.setAttribute('aria-hidden', 'false');
            }
        }

        async function initGallery() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');
            const username = params.get('user');
            const uid = params.get('uid');

            if (!uid && !username) {
                showGalleryError('gallery.errorMissingParams');
                return;
            }

            const backBtn = document.querySelector('.gallery-nav-back');
            if (backBtn) {
                const search = new URLSearchParams();
                if (username) search.set('user', username);
                if (uid) search.set('uid', uid);
                const searchStr = search.toString();
                if (searchStr) backBtn.href = `index.html?${searchStr}`;
            }

            try {
                const [profile, project] = await Promise.all([
                    getProfile(username, uid),
                    getProject(uid, projectId)
                ]);

                if (profile && profile.name) {
                    document.title = `Gallery | ${profile.name}`;
                }

                if (!project) {
                    const backHref = username || uid ? `index.html?${new URLSearchParams({ user: username || '', uid: uid || '' }).toString()}` : 'index.html';
                    showGalleryError('gallery.errorNotFound', backHref);
                    return;
                }

                const titleEl = document.getElementById('gallery-title');
                const yearEl = document.getElementById('gallery-year');
                if (titleEl) {
                    titleEl.textContent = project.name.toLocaleUpperCase(window.currentLanguage === 'tr' ? 'tr-TR' : 'en-US');
                    titleEl.removeAttribute('data-i18n');
                }
                if (yearEl) {
                    yearEl.textContent = project.description;
                    yearEl.removeAttribute('data-i18n');
                }

                const galleryContainer = document.getElementById('galleryContainer');
                if (!galleryContainer || !project.images || project.images.length === 0) {
                    const search = new URLSearchParams();
                    if (username) search.set('user', username);
                    if (uid) search.set('uid', uid);
                    showGalleryError('gallery.errorNoImages', search.toString() ? `index.html?${search.toString()}` : 'index.html');
                    return;
                }

                galleryContainer.innerHTML = project.images.map(url => {
                    const optimizedUrl = getOptimizedImageUrl(url, { width: 1600, quality: 85, format: 'webp' });
                    return `
                        <div class="gallery-slide">
                            <img src="${optimizedUrl}" alt="${project.name}" loading="eager"
                                onerror="if (this.src !== '${url}') this.src = '${url}';">
                        </div>
                    `;
                }).join('');

                const imgs = galleryContainer.querySelectorAll('.gallery-slide img');
                const loadPromises = Array.from(imgs).map((img) => {
                    if (img.complete) return Promise.resolve();
                    return new Promise((resolve) => {
                        img.addEventListener('load', resolve, { once: true });
                        img.addEventListener('error', resolve, { once: true });
                    });
                });
                await Promise.all(loadPromises);
                sessionStorage.setItem("returnFromDetail", "1");
                hideProgressOverlay();

                const allProjects = await getProjects(null, profile.id);
                const currentIndex = allProjects.findIndex(p => p.id === project.id);
                const prevProject = currentIndex > 0 ? allProjects[currentIndex - 1] : null;
                const nextProject = currentIndex >= 0 && currentIndex < allProjects.length - 1 ? allProjects[currentIndex + 1] : null;
                const nextProjectBtn = document.getElementById('nextProjectBtn');
                if (nextProjectBtn) {
                    if (nextProject) {
                        nextProjectBtn.href = `project-detail.html?user=${encodeURIComponent(username || '')}&uid=${encodeURIComponent(uid || '')}&id=${encodeURIComponent(nextProject.id)}`;
                        nextProjectBtn.style.display = '';
                    } else {
                        nextProjectBtn.style.display = 'none';
                    }
                }

                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const threshold = 20;
                function isFirstImage() {
                    return container.scrollLeft <= threshold;
                }
                function isLastImage() {
                    const maxScroll = container.scrollWidth - container.clientWidth;
                    return maxScroll <= threshold || container.scrollLeft >= maxScroll - threshold;
                }
                function updatePrevNextVisibility() {
                    if (prevBtn) {
                        prevBtn.style.display = isFirstImage() && !prevProject ? 'none' : '';
                    }
                    if (nextBtn) {
                        nextBtn.style.display = isLastImage() && !nextProject ? 'none' : '';
                    }
                }

                prevBtn.addEventListener('click', () => {
                    if (isFirstImage() && prevProject) {
                        const url = `project-detail.html?user=${encodeURIComponent(username || '')}&uid=${encodeURIComponent(uid || '')}&id=${encodeURIComponent(prevProject.id)}#last`;
                        location.assign(url);
                        return;
                    }
                    container.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
                });
                nextBtn.addEventListener('click', () => {
                    if (isLastImage() && nextProject) {
                        const url = `project-detail.html?user=${encodeURIComponent(username || '')}&uid=${encodeURIComponent(uid || '')}&id=${encodeURIComponent(nextProject.id)}`;
                        location.assign(url);
                        return;
                    }
                    container.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
                });
                container.addEventListener('scroll', () => {
                    setTimeout(updatePrevNextVisibility, 50);
                }, { passive: true });

                /* Mobile: same prev/next project logic on swipe at boundaries (no arrow buttons on mobile) */
                const SWIPE_THRESHOLD_PX = 60;
                let touchStartX = 0;
                let touchStartScrollLeft = 0;
                container.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 0) return;
                    touchStartX = e.touches[0].clientX;
                    touchStartScrollLeft = container.scrollLeft;
                }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    if (e.changedTouches.length === 0) return;
                    const deltaX = e.changedTouches[0].clientX - touchStartX;
                    const maxScroll = container.scrollWidth - container.clientWidth;
                    const atStart = container.scrollLeft <= 20;
                    const atEnd = maxScroll <= 20 || container.scrollLeft >= maxScroll - 20;
                    if (atStart && prevProject && deltaX > SWIPE_THRESHOLD_PX) {
                        const url = `project-detail.html?user=${encodeURIComponent(username || '')}&uid=${encodeURIComponent(uid || '')}&id=${encodeURIComponent(prevProject.id)}#last`;
                        location.assign(url);
                        return;
                    }
                    if (atEnd && nextProject && deltaX < -SWIPE_THRESHOLD_PX) {
                        const url = `project-detail.html?user=${encodeURIComponent(username || '')}&uid=${encodeURIComponent(uid || '')}&id=${encodeURIComponent(nextProject.id)}`;
                        location.assign(url);
                    }
                }, { passive: true });

                if (location.hash === '#last') {
                    container.scrollLeft = container.scrollWidth - container.clientWidth;
                    history.replaceState(null, '', location.pathname + location.search);
                }
                updatePrevNextVisibility();
            } catch (error) {
                console.error("Gallery initialization failed:", error);
                const search = new URLSearchParams();
                if (typeof username !== 'undefined' && username) search.set('user', username);
                if (typeof uid !== 'undefined' && uid) search.set('uid', uid);
                const backHref = search.toString() ? `index.html?${search.toString()}` : 'index.html';
                showGalleryError('gallery.errorLoadFailed', backHref);
            }
        }

        initGallery();
    </script>
</body>

</html>
