<!DOCTYPE html>
<html lang="en" class="noscroll-html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Cardfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project-detail.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
</head>

<body class="gallery-body">

    <!-- Top Navigation -->
    <a href="index.html" class="ui-overlay gallery-nav-back" data-i18n="nav.back">&larr; BACK TO CARDFOLIO</a>

    <!-- Minimal Metadata Overlay -->
    <div class="ui-overlay gallery-meta">
        <h1 class="gallery-title" id="gallery-title"></h1>
        <p class="gallery-year" id="gallery-year"></p>
    </div>

    <!-- Slider Controls -->
    <div class="gallery-controls">
        <button id="prevBtn" class="gallery-btn">&larr;</button>
        <button id="nextBtn" class="gallery-btn">&rarr;</button>
    </div>

    <!-- Swipe Hint (icon only, no text) -->
    <div class="gallery-drag-hint" id="galleryDragHint">
        <dotlottie-player src="/drag_anim.lottie" background="transparent" speed="1" loop autoplay
            style="width: 180px; height: 180px;"></dotlottie-player>
    </div>

    <!-- The Horizontal Scroll Container -->
    <div class="gallery-container" id="galleryContainer">
        <!-- Content injected dynamically -->
    </div>

    <script>
        const container = document.getElementById('galleryContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Scroll one full viewport width at a time
        nextBtn.addEventListener('click', () => {
            container.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
        });

        prevBtn.addEventListener('click', () => {
            container.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
        });

        const galleryHint = document.getElementById('galleryDragHint');
        function dismissHint() {
            if (!galleryHint) return;
            galleryHint.style.opacity = '0';
            setTimeout(() => galleryHint.remove(), 500);
            container.removeEventListener('scroll', dismissHint);
            container.removeEventListener('touchstart', dismissHint);
        }
        if (galleryHint) {
            container.addEventListener('scroll', dismissHint, { passive: true });
            container.addEventListener('touchstart', dismissHint, { passive: true });
        }
    </script>

    <!-- Language Engine -->
    <script type="module">
        import { initI18n } from "./src/i18n.js";
        initI18n();
    </script>

    <!-- Gallery Data Loader -->
    <script type="module">
        import { getProjects, getProfile } from "./src/data.js";

        async function initGallery() {
            // 1. Parse ID and User from URL
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');
            const username = params.get('user');

            // Set back link to preserve tenant
            const backBtn = document.querySelector('.gallery-nav-back');
            if (backBtn && username) {
                backBtn.href = `index.html?user=${username}`;
            }

            // 2. Load Profile (for page title)
            const profile = await getProfile(username);
            if (profile && profile.name) {
                document.title = `Gallery | ${profile.name}`;
            }

            // 3. Load Project Data
            const projects = await getProjects(username);
            const project = projects.find(p => p.id === projectId) || projects[0];

            if (project) {
                // 4. Update Title and Desc
                const titleEl = document.getElementById('gallery-title');
                const yearEl = document.getElementById('gallery-year');

                if (titleEl) {
                    titleEl.textContent = project.name;
                    titleEl.removeAttribute('data-i18n'); // Don't let i18n override dynamic titles
                }
                if (yearEl) {
                    yearEl.textContent = project.description;
                    yearEl.removeAttribute('data-i18n');
                }

                // 5. Inject Images
                const galleryContainer = document.getElementById('galleryContainer');
                if (galleryContainer && project.images) {
                    galleryContainer.innerHTML = project.images.map(url => `
                        <div class="gallery-slide">
                            <img src="${url}" alt="${project.name}">
                        </div>
                    `).join('');
                }
            } else {
                // Not found
                document.getElementById('gallery-title').textContent = "Project Not Found";
                document.getElementById('gallery-year').textContent = "";
            }
        }

        initGallery();
    </script>
</body>

</html>
