<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardfolio</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Background Text -->
        <div class="bg-text-container">
            <h1 class="bg-text" data-i18n="nav.portfolio">CARDFOLIO</h1>
        </div>

        <!-- UI Overlays -->
        <a href="profile.html" class="ui-overlay top-left" style="display: none;"></a>
        <div class="ui-overlay top-right" style="display: none;"></div>

        <!-- Draggable Container -->
        <div class="draggable-container" id="container">
            <!-- Cards will be injected here or hardcoded -->
        </div>

        <!-- Drag Hint Animation Overlay -->
        <div class="drag-hint" id="dragHint" style="display: none;">
            <span data-i18n="index.dragToExplore">Drag to Explore</span>
            <dotlottie-player src="/drag_anim.lottie" background="transparent" speed="1" loop autoplay
                class="responsive-lottie"></dotlottie-player>
        </div>

        <!-- Bottom Area: Toggle Button + Footer Text -->
        <div class="bottom-area" style="display: none;">
            <button id="drag-reset-btn" class="action-btn icon-btn" aria-label="Toggle View">
                <!-- Grid Icon -->
                <svg id="icon-grid" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <!-- Stack Icon (Hidden by default) -->
                <svg id="icon-stack" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 8l8-4 8 4-8 4-8-4z"></path>
                    <path d="M4 12l8 4 8-4"></path>
                    <path d="M4 16l8 4 8-4"></path>
                </svg>
            </button>
            <div class="bottom-text-inner">
                <span></span>
                <a href="admin.html" aria-label="Edit Cardfolio" class="footer-edit-link" title="Edit Cardfolio">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
