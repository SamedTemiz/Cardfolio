<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardfolio Studio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
</head>

<body>
    <!-- ── Initial Loading Overlay ── -->
    <div id="auth-loader" class="auth-overlay active">
        <div class="auth-box" style="background:transparent; border:none; box-shadow:none; text-align:center;">
            <dotlottie-player src="/drag_anim.lottie" background="transparent" speed="1" loop autoplay
                style="width: 80px; height: 80px; margin: 0 auto;"></dotlottie-player>
            <p style="color:var(--text2); margin-top:20px; font-weight:600; font-family:sans-serif;"
                data-i18n="admin.loading">Loading Studio...</p>
        </div>
    </div>

    <!-- ── Auth Overlay ── -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-tag">CARDFOLIO</div>
                <h2 id="auth-title" data-i18n="admin.authLogin">Login</h2>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label data-i18n="admin.authEmail">EMAIL</label>
                    <input type="email" id="auth-email" required placeholder="user@example.com" class="auth-input" />
                </div>
                <div class="form-group" style="position: relative;">
                    <label data-i18n="admin.authPassword">PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" id="auth-password" required placeholder="••••••••••••••"
                            class="auth-input" />
                        <button type="button" class="btn-eye" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" style="display:none;" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <a href="#" id="btn-forgot-password" data-i18n="admin.authForgotPassword"
                        style="font-size: 11px; font-weight: 500; color: var(--text2); margin-top: 8px; text-decoration: none; align-self: flex-end; transition: color 0.2s;">Forgot
                        Password?</a>
                </div>
                <div id="auth-error" class="auth-error-msg"
                    style="display:none; color: var(--danger); font-size: 13px; margin-top: -10px; margin-bottom: 20px;">
                </div>
                <button type="submit" class="btn-auth-submit" id="btn-auth-submit"
                    data-i18n="admin.authLogin">Login</button>
            </form>

            <div class="auth-footer" id="auth-footer-container">
                <span id="auth-switch-text" data-i18n="admin.authNoAccount">Don't have an account?</span>
                <button type="button" class="btn-auth-switch" id="btn-auth-switch"
                    data-i18n="admin.authRegister">Register</button>
            </div>

            <!-- RESET PASSWORD REQUEST FORM (Hidden by default) -->
            <form id="auth-reset-form" style="display:none;">
                <div class="form-group">
                    <label data-i18n="admin.authEmail">EMAIL</label>
                    <input type="email" id="auth-reset-email" required placeholder="user@example.com"
                        class="auth-input" />
                </div>
                <div id="auth-reset-error" class="auth-error-msg"
                    style="display:none; color: var(--danger); font-size: 13px; margin-top: -10px; margin-bottom: 20px;">
                </div>
                <button type="submit" class="btn-auth-submit" id="btn-auth-reset-submit"
                    data-i18n="admin.authResetPasswordBtn">Send Reset Link</button>
                <div style="text-align: center; margin-top: 24px;">
                    <button type="button" class="btn-auth-switch" id="btn-back-to-login"
                        data-i18n="admin.authBackToLogin">Back to Login</button>
                </div>
            </form>

            <!-- SET NEW PASSWORD FORM (Hidden by default) -->
            <form id="auth-new-password-form" style="display:none;">
                <div class="form-group">
                    <label data-i18n="admin.authPassword">NEW PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" id="auth-new-password" required placeholder="••••••••••••••"
                            class="auth-input" />
                        <button type="button" class="btn-eye" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" style="display:none;" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="admin.authConfirmPassword">CONFIRM PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" id="auth-confirm-password" required placeholder="••••••••••••••"
                            class="auth-input" />
                        <button type="button" class="btn-eye" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" style="display:none;" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="auth-new-password-error" class="auth-error-msg"
                    style="display:none; color: var(--danger); font-size: 13px; margin-top: -10px; margin-bottom: 20px;">
                </div>
                <button type="submit" class="btn-auth-submit" id="btn-auth-new-password-submit"
                    data-i18n="admin.authNewPasswordBtn">Update Password</button>
            </form>
        </div>
    </div>

    <!-- ── Main App (Hidden until logged in) ── -->
    <div class="admin-layout" id="admin-layout" style="display:none;">

        <!-- Mobile Header Toggle -->
        <button class="admin-mobile-toggle" id="admin-mobile-toggle" aria-label="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <!-- ── Sidebar ── -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <div class="logo-tag">Cardfolio</div>
                <h1 data-i18n="admin.sidebarLogo">STUDIO</h1>
            </div>

            <nav class="admin-nav">
                <button class="admin-nav-item active" data-section="profile" data-i18n="admin.navProfile">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Profile
                </button>
                <button class="admin-nav-item" data-section="projects" data-i18n="admin.navProjects">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Projects
                </button>
            </nav>

            <div class="admin-sidebar-footer">
                <a href="index.html" class="btn btn-primary" id="btn-back-to-site" data-i18n="admin.backToSite"
                    style="width: 100%; justify-content: center; gap: 8px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    View Cardfolio
                </a>
                <button class="btn btn-ghost btn-sm" id="btn-logout" data-i18n="admin.logout"
                    style="width: 100%; margin-top: 10px; color: var(--danger-color); text-align: left;">
                    Log out
                </button>
            </div>
        </aside>

        <!-- ── Main ── -->
        <main class="admin-main">

            <!-- PROJECTS SECTION -->
            <section id="section-projects" class="admin-section">

                <!-- Add Project Form -->
                <div class="add-card">
                    <h3 data-i18n="admin.addProjectTitle">Add New Project</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="admin.projectName">Project Name</label>
                            <input type="text" id="new-project-name" data-i18n="admin.projectNamePlace"
                                data-i18n-target="placeholder" placeholder="e.g. Neon Poster Series" />
                        </div>
                        <div class="form-group">
                            <label data-i18n="admin.projectDesc">Description</label>
                            <input type="text" id="new-project-desc" data-i18n="admin.projectDescPlace"
                                data-i18n-target="placeholder" placeholder="e.g. 2026 — Lead Designer" />
                        </div>
                        <button class="btn btn-primary" id="btn-add-project" data-i18n="admin.btnAdd">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Add
                        </button>
                    </div>
                </div>

                <!-- Project List -->
                <div class="section-header">
                    <h2 data-i18n="admin.sectionProjects">Projects</h2>
                    <span id="project-count" style="font-size:11px;color:var(--text2)"></span>
                </div>
                <div class="project-list" id="project-list">
                    <!-- rendered by JS -->
                </div>

                <!-- Image Detail Panel -->
                <div class="image-panel" id="image-panel">
                    <div class="image-panel-header">
                        <h3 id="image-panel-title" data-i18n="admin.imagePanelTitle">Images</h3>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-primary btn-sm" id="btn-save-project-details"
                                data-i18n="admin.btnSave">Save</button>
                            <button class="btn btn-ghost btn-sm" id="btn-close-panel"
                                data-i18n="admin.btnClose">Close</button>
                        </div>
                    </div>

                    <!-- Project Metadata Editor -->
                    <div class="form-row" style="margin-bottom: 24px;">
                        <div class="form-group">
                            <label data-i18n="admin.projectName">Project Name</label>
                            <input type="text" id="edit-project-name" />
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label data-i18n="admin.projectDesc">Description</label>
                            <input type="text" id="edit-project-desc" />
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Add Image Row -->
                    <div class="image-add-row" style="display:flex; gap:10px; align-items:center;">
                        <input type="file" id="new-image-file" accept="image/png, image/jpeg, image/webp" multiple
                            style="flex:1" />
                        <button class="btn btn-primary btn-sm" id="btn-add-image" data-i18n="admin.btnUpload">Upload
                            Image(s)</button>
                    </div>

                    <!-- Image Grid -->
                    <div class="image-grid" id="image-grid">
                        <!-- rendered by JS -->
                    </div>
                </div>

            </section>

            <!-- PROFILE SECTION -->
            <section id="section-profile" class="admin-section active">

                <div class="section-header">
                    <h2 data-i18n="admin.sectionProfile">Profile</h2>
                    <button class="btn btn-primary" id="btn-save-profile" data-i18n="admin.btnSave">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Save
                    </button>
                </div>

                <div class="profile-form">
                    <!-- Profile Picture Upload -->
                    <div class="form-row" style="margin-bottom: 20px;">
                        <div class="profile-pic-container">
                            <img id="prof-pic-preview"
                                src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y" />
                            <div class="profile-pic-info">
                                <label data-i18n="admin.profPic">Profile Picture</label>
                                <input type="file" id="prof-pic-file" accept="image/png, image/jpeg, image/webp" />
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label data-i18n="admin.profUsername">Cardfolio Username</label>
                            <input type="text" id="prof-username" placeholder="e.g. johndoe" />
                        </div>
                        <div class="form-group" style="flex:2;">
                            <label data-i18n="admin.profUrl">Your Cardfolio Link</label>
                            <div class="url-copy-box">
                                <span id="prof-url-preview">https://cardfolio.app/?user=</span>
                                <button type="button" class="btn btn-ghost btn-sm" id="btn-copy-url"
                                    data-i18n="admin.btnCopyUrl">Copy Link</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="admin.profName">Full Name</label>
                            <input type="text" id="prof-name" />
                        </div>
                        <div class="form-group">
                            <label data-i18n="admin.profTitle">Title</label>
                            <input type="text" id="prof-title" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profTagline">Tagline</label>
                        <input type="text" id="prof-tagline" />
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profAbout">About Me</label>
                        <textarea id="prof-about" rows="5"></textarea>
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profEmail">Email</label>
                        <input type="email" id="prof-email" />
                    </div>

                    <hr class="divider" />

                    <div class="form-group">
                        <label data-i18n="admin.profSkills">Skills</label>
                        <div class="skills-editor">
                            <div class="skills-tags" id="skills-tags"></div>
                            <div class="skill-add-row">
                                <input type="text" id="new-skill" data-i18n="admin.skillPlaceholder"
                                    data-i18n-target="placeholder" placeholder="Add skill…" />
                                <button class="btn btn-ghost btn-sm" id="btn-add-skill"
                                    data-i18n="admin.btnAddSkill">Add</button>
                            </div>
                        </div>
                    </div>
                </div>

            </section>

        </main>
    </div>

    <!-- Custom Confirmation Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title" data-i18n="admin.confirmTitle">Confirm</h3>
            <p id="modal-message" data-i18n="admin.confirmMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-warning" id="modal-discard" style="display:none;">Discard</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Crop Modal -->
    <div id="crop-modal" class="modal-overlay" style="display:none; z-index:9999;">
        <div class="modal-box"
            style="max-width: 800px; width: 95%; max-height: 95vh; display: flex; flex-direction: column;">
            <h3 data-i18n="admin.cropTitle" style="margin-bottom: 15px;">Crop Profile Picture</h3>
            <div
                style="flex: 1; min-height: 300px; max-height: 75vh; width: 100%; overflow: hidden; margin-bottom: 20px; background: #000; border-radius: 8px;">
                <img id="crop-image" src="" style="max-width: 100%; display: block;">
            </div>
            <div class="modal-actions" style="margin-top: auto;">
                <button class="btn btn-ghost" id="btn-cancel-crop" data-i18n="admin.btnCancel">Cancel</button>
                <button class="btn btn-primary" id="btn-confirm-crop" data-i18n="admin.btnCropSave">Crop & Save</button>
            </div>
        </div>
    </div>

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module" src="/src/admin.js"></script>
</body>

</html>
