<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — Portfolio</title>
    <link rel="stylesheet" href="./admin.css" />
</head>

<body>
    <!-- ── Initial Loading Overlay ── -->
    <div id="auth-loader" class="auth-overlay active">
        <div class="auth-box" style="background:transparent; border:none; box-shadow:none; text-align:center;">
            <dotlottie-player src="/drag_anim.lottie" background="transparent" speed="1" loop autoplay
                style="width: 80px; height: 80px; margin: 0 auto;"></dotlottie-player>
            <p style="color:var(--text2); margin-top:20px; font-weight:600; font-family:sans-serif;"
                data-i18n="admin.loading">Loading Admin Panel...</p>
        </div>
    </div>

    <!-- ── Auth Overlay ── -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-tag">PORTFOLIO</div>
                <h2 id="auth-title" data-i18n="admin.authLogin">Login</h2>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label data-i18n="admin.authEmail">EMAIL</label>
                    <input type="email" id="auth-email" required placeholder="timrashard@gmail.com"
                        class="auth-input" />
                </div>
                <div class="form-group">
                    <label data-i18n="admin.authPassword">PASSWORD</label>
                    <input type="password" id="auth-password" required placeholder="••••••••••••••"
                        class="auth-input" />
                </div>
                <div id="auth-error" class="auth-error-msg" style="display:none;"></div>
                <button type="submit" class="btn-auth-submit" id="btn-auth-submit"
                    data-i18n="admin.authLogin">Login</button>
            </form>

            <div class="auth-footer">
                <span id="auth-switch-text" data-i18n="admin.authNoAccount">Don't have an account?</span>
                <button type="button" class="btn-auth-switch" id="btn-auth-switch"
                    data-i18n="admin.authRegister">Register</button>
            </div>
        </div>
    </div>

    <!-- ── Main App (Hidden until logged in) ── -->
    <div class="admin-layout" id="admin-layout" style="display:none;">

        <!-- ── Sidebar ── -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-logo">
                <div class="logo-tag">Portfolio</div>
                <h1>ADMIN PANEL</h1>
            </div>

            <nav class="admin-nav">
                <button class="admin-nav-item active" data-section="profile" data-i18n="admin.navProfile">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Profile
                </button>
                <button class="admin-nav-item" data-section="projects" data-i18n="admin.navProjects">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Projects
                </button>
            </nav>

            <div class="admin-sidebar-footer">
                <a href="index.html" class="back-link" id="btn-back-to-site" data-i18n="admin.backToSite">&larr; Back to
                    Site</a>
                <button class="btn btn-ghost btn-sm" id="btn-logout" data-i18n="admin.logout"
                    style="width: 100%; margin-top: 10px; color: var(--danger-color); text-align: left;">
                    Log out
                </button>
            </div>
        </aside>

        <!-- ── Main ── -->
        <main class="admin-main">

            <!-- PROJECTS SECTION -->
            <section id="section-projects" class="admin-section active">

                <!-- Add Project Form -->
                <div class="add-card">
                    <h3 data-i18n="admin.addProjectTitle">Add New Project</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="admin.projectName">Project Name</label>
                            <input type="text" id="new-project-name" data-i18n="admin.projectNamePlace"
                                data-i18n-target="placeholder" placeholder="e.g. Neon Poster Series" />
                        </div>
                        <div class="form-group">
                            <label data-i18n="admin.projectDesc">Description</label>
                            <input type="text" id="new-project-desc" data-i18n="admin.projectDescPlace"
                                data-i18n-target="placeholder" placeholder="e.g. 2026 — Lead Designer" />
                        </div>
                        <button class="btn btn-primary" id="btn-add-project" data-i18n="admin.btnAdd">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Add
                        </button>
                    </div>
                </div>

                <!-- Project List -->
                <div class="section-header">
                    <h2 data-i18n="admin.sectionProjects">Projects</h2>
                    <span id="project-count" style="font-size:11px;color:var(--text2)"></span>
                </div>
                <div class="project-list" id="project-list">
                    <!-- rendered by JS -->
                </div>

                <!-- Image Detail Panel -->
                <div class="image-panel" id="image-panel">
                    <div class="image-panel-header">
                        <h3 id="image-panel-title" data-i18n="admin.imagePanelTitle">Images</h3>
                        <button class="btn btn-ghost btn-sm" id="btn-close-panel"
                            data-i18n="admin.btnClose">Close</button>
                    </div>

                    <!-- Add Image Row -->
                    <div class="image-add-row" style="display:flex; gap:10px; align-items:center;">
                        <input type="file" id="new-image-file" accept="image/png, image/jpeg, image/webp" multiple
                            style="flex:1" />
                        <button class="btn btn-primary btn-sm" id="btn-add-image" data-i18n="admin.btnUpload">Upload
                            Image(s)</button>
                    </div>

                    <!-- Image Grid -->
                    <div class="image-grid" id="image-grid">
                        <!-- rendered by JS -->
                    </div>
                </div>

            </section>

            <!-- PROFILE SECTION -->
            <section id="section-profile" class="admin-section">

                <div class="section-header">
                    <h2 data-i18n="admin.sectionProfile">Profile</h2>
                    <button class="btn btn-primary" id="btn-save-profile" data-i18n="admin.btnSave">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Save
                    </button>
                </div>

                <div class="profile-form">
                    <!-- Profile Picture Upload -->
                    <div class="form-row" style="margin-bottom: 20px;">
                        <div class="form-group"
                            style="align-items: center; border: 1px dashed rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; display:flex; gap: 20px; flex-direction: row; width: 100%;">
                            <img id="prof-pic-preview"
                                src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y"
                                style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;" />
                            <div style="flex:1;">
                                <label style="margin-bottom:8px; display:block;" data-i18n="admin.profPic">Profile
                                    Picture</label>
                                <input type="file" id="prof-pic-file" accept="image/png, image/jpeg, image/webp" />
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="admin.profName">Full Name</label>
                            <input type="text" id="prof-name" />
                        </div>
                        <div class="form-group">
                            <label data-i18n="admin.profTitle">Title</label>
                            <input type="text" id="prof-title" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profTagline">Tagline</label>
                        <input type="text" id="prof-tagline" />
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profAbout">About Me</label>
                        <textarea id="prof-about" rows="5"></textarea>
                    </div>

                    <div class="form-group">
                        <label data-i18n="admin.profEmail">Email</label>
                        <input type="email" id="prof-email" />
                    </div>

                    <hr class="divider" />

                    <div class="form-group">
                        <label data-i18n="admin.profSkills">Skills</label>
                        <div class="skills-editor">
                            <div class="skills-tags" id="skills-tags"></div>
                            <div class="skill-add-row">
                                <input type="text" id="new-skill" data-i18n="admin.skillPlaceholder"
                                    data-i18n-target="placeholder" placeholder="Add skill…" />
                                <button class="btn btn-ghost btn-sm" id="btn-add-skill"
                                    data-i18n="admin.btnAddSkill">Add</button>
                            </div>
                        </div>
                    </div>
                </div>

            </section>

        </main>
    </div>

    <!-- Custom Confirmation Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">Confirm</h3>
            <p id="modal-message">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="/src/admin.js"></script>
</body>

</html>
