<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Cardfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="profile-body">
    <a href="index.html" class="ui-overlay top-left" id="prof-back-link" data-i18n="nav.back">&larr; BACK TO
        CARDFOLIO</a>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-pic-container">
                <div class="profile-pic" id="prof-pic-display"></div>
            </div>
            <h1 class="name-title" id="prof-name"></h1>
            <p class="tagline" id="prof-tagline"></p>
        </div>

        <div class="profile-content">
            <div class="section about">
                <h2 data-i18n="profile.aboutTitle">ABOUT ME</h2>
                <p id="prof-about"></p>
            </div>

            <div class="section skills">
                <h2 data-i18n="profile.skillsTitle">SKILLS</h2>
                <div class="skill-tags" id="prof-skills"></div>
            </div>

            <div class="section contact">
                <h2 data-i18n="profile.contactTitle">CONTACT</h2>
                <a id="prof-email-link" href="mailto:contact@example.com" class="contact-btn"
                    data-i18n="profile.getInTouch">GET IN TOUCH</a>
            </div>
        </div>
    </div>

    <!-- Language Engine -->
    <script type="module">
        import { initI18n } from "./src/i18n.js";
        initI18n();
    </script>

    <!-- Profile Data Loader -->
    <script type="module">
        import { getProfile } from "./src/data.js";

        async function initProfile() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('user');

            // Preserve tenant on back nav
            const backBtn = document.getElementById('prof-back-link');
            if (backBtn && username) {
                backBtn.href = `index.html?user=${username}`;
            }

            // Fetch remote data
            const p = await getProfile(username);

            const picEl = document.getElementById("prof-pic-display");
            const nameEl = document.getElementById("prof-name");
            const taglineEl = document.getElementById("prof-tagline");
            const aboutEl = document.getElementById("prof-about");
            const skillsEl = document.getElementById("prof-skills");
            const emailLink = document.getElementById("prof-email-link");

            if (picEl) {
                if (p.avatar_url) {
                    picEl.style.backgroundImage = `url(${p.avatar_url})`;
                } else {
                    picEl.style.backgroundImage = `url(https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y)`;
                }
            }

            if (nameEl && p.name) {
                nameEl.textContent = p.name;
                document.title = `${p.name} - Profile`;
            }
            if (taglineEl && p.tagline) taglineEl.textContent = p.tagline;
            if (aboutEl && p.about) aboutEl.textContent = p.about;

            if (emailLink && p.email) {
                emailLink.href = `mailto:${p.email}`;
            }

            if (skillsEl && p.skills && p.skills.length > 0) {
                skillsEl.innerHTML = p.skills.map(s => `<span>${s}</span>`).join("");
            }
        }

        initProfile();
    </script>

</body>

</html>
